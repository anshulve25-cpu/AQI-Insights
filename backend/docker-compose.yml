version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nebula_db_enterprise
    environment:
      POSTGRES_USER: nebula_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aqi_monitoring
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: